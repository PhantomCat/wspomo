<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="sync-toggle" id="syncToggle" title="Синхронизация с рабочим днём">W</button>
  <button class="theme-toggle" id="themeToggle" title="Тема">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.4 5.4 0 0 1-4.4 4.26 7 7 0 0 1-4.5-12.9z"/></svg>
  </button>
  <button class="settings-toggle" id="settingsToggle" aria-label="Настройки">&#9881;</button>

  <div class="settings-overlay" id="settingsOverlay"></div>

    <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2 id="settingsTitle">Настройки</h2>
      <button class="settings-close" id="settingsClose">&times;</button>
    </div>

    <div class="settings-section">
      <h3 id="langSectionTitle">Язык</h3>
      <div class="lang-selector">
        <button class="lang-btn active" data-lang="ru">Русский</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
    </div>

    <div class="settings-section">
      <h3 id="durationSectionTitle">Длительность (мин)</h3>
      <div class="setting-row">
        <label data-i18n="work">Работа</label>
        <input type="number" id="workDuration" min="1" max="120" value="25">
      </div>
      <div class="setting-row">
        <label data-i18n="shortBreak">Короткий перерыв</label>
        <input type="number" id="shortBreakDuration" min="1" max="30" value="5">
      </div>
      <div class="setting-row">
        <label data-i18n="longBreak">Длинный перерыв</label>
        <input type="number" id="longBreakDuration" min="1" max="60" value="15">
      </div>
      <div class="setting-row">
        <label data-i18n="sessionsBeforeLongBreak">Сессий до длинного перерыва</label>
        <input type="number" id="sessionsBeforeLongBreak" min="2" max="10" value="4">
      </div>
    </div>

    <div class="settings-section">
      <h3 id="syncSectionTitle">Синхронизация</h3>
      <div class="workday-settings" id="workdaySettings">
        <div class="workday-row">
          <label data-i18n="workdayStart">Начало рабочего дня</label>
          <input type="text" class="time-text-input" id="workdayStart" value="09:00" placeholder="HH:MM" maxlength="5" inputmode="numeric">
        </div>
        <div class="workday-row">
          <label data-i18n="lunchEnabled">Обед</label>
          <label class="toggle-switch">
            <input type="checkbox" id="lunchEnabled" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="workday-row" id="lunchStartRow">
          <label data-i18n="lunchStart">Начало обеда</label>
          <input type="text" class="time-text-input" id="lunchStart" value="13:00" placeholder="HH:MM" maxlength="5" inputmode="numeric">
        </div>
        <div class="workday-row" id="lunchEndRow">
          <label data-i18n="lunchEnd">Конец обеда</label>
          <input type="text" class="time-text-input" id="lunchEnd" value="14:00" placeholder="HH:MM" maxlength="5" inputmode="numeric">
        </div>
        <div class="workday-row">
          <label data-i18n="workdayEnd">Конец рабочего дня</label>
          <input type="text" class="time-text-input" id="workdayEnd" value="18:00" placeholder="HH:MM" maxlength="5" inputmode="numeric">
        </div>
        <div class="workday-days" id="workdayDays">
          <label class="workday-day"><input type="checkbox" data-day="1" value="1"><span>Пн</span></label>
          <label class="workday-day"><input type="checkbox" data-day="2" value="2"><span>Вт</span></label>
          <label class="workday-day"><input type="checkbox" data-day="3" value="3"><span>Ср</span></label>
          <label class="workday-day"><input type="checkbox" data-day="4" value="4"><span>Чт</span></label>
          <label class="workday-day"><input type="checkbox" data-day="5" value="5"><span>Пт</span></label>
          <label class="workday-day"><input type="checkbox" data-day="6" value="6"><span>Сб</span></label>
          <label class="workday-day"><input type="checkbox" data-day="0" value="0"><span>Вс</span></label>
        </div>
        <div class="sync-info">
          <strong data-i18n="howItWorksTitle">Как работает:</strong> <span data-i18n="howItWorksText">Таймер привязывается к началу часа. Если включено в 09:15 — цепочка начнётся с 09:00, а таймер покажет оставшееся время текущей сессии. Обед пропускается в расчётах.</span>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h3 id="notifSectionTitle">Уведомления</h3>
      <div class="notification-section">
        <div class="setting-row">
          <label data-i18n="sound">Звук</label>
          <label class="toggle-switch">
            <input type="checkbox" id="soundEnabled" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <label data-i18n="browserNotif">Браузерные уведомления</label>
          <label class="toggle-switch">
            <input type="checkbox" id="browserNotification" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <button class="btn-test-sound" id="testSoundBtn" data-i18n="testSound">&#128264; Проверить звук</button>
      </div>
    </div>

    <button class="btn-save" id="saveSettings" data-i18n="save">Сохранить</button>
  </div>

  <div class="main-wrapper">
  <div class="container">
    <div class="mode-tabs">
      <button class="mode-tab active work" data-mode="work" data-i18n="work">Работа</button>
      <button class="mode-tab short-break" data-mode="shortBreak" data-i18n="shortBreak">Короткий</button>
      <button class="mode-tab long-break" data-mode="longBreak" data-i18n="longBreak">Длинный</button>
    </div>

    <div class="timer-display">
      <div class="timer-circle">
        <svg viewBox="0 0 280 280">
          <circle class="bg" cx="140" cy="140" r="130"></circle>
          <circle class="progress" id="progressCircle" cx="140" cy="140" r="130"
                  stroke-dasharray="816.81" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-text">
          <div class="timer-time" id="timerTime">25:00</div>
          <div class="timer-label" id="timerLabel">Фокус</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="resetBtn" data-i18n="reset">Сброс</button>
      <button class="btn btn-primary" id="startBtn" data-i18n="start">Старт</button>
      <button class="btn btn-secondary" id="skipBtn" data-i18n="skip">Пропуск</button>
    </div>

    <div class="session-info">
      <span><span data-i18n="session">Сессия</span> <span id="currentSession">1</span> / <span id="totalSessions">4</span></span>
      <div class="session-dots" id="sessionDots"></div>
    </div>

    <div class="next-session" id="nextSession"></div>
  </div>
  </div>

  <footer class="footer">
    <a class="github-link" href="https://github.com/PhantomCat/wspomo" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      <span class="star-icon">&#9733;</span>
      <span data-i18n="starOnGithub">Star on GitHub</span>
    </a>
  </footer>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 130;

    const translations = {
      ru: {
        settings: 'Настройки',
        language: 'Язык',
        durations: 'Длительность (мин)',
        sync: 'Синхронизация',
        notifications: 'Уведомления',
        work: 'Работа',
        shortBreak: 'Короткий перерыв',
        longBreak: 'Длинный перерыв',
        sessionsBeforeLongBreak: 'Сессий до длинного перерыва',
        workdaySync: 'Синхрон с рабочим днём',
        workdayStart: 'Начало рабочего дня',
        lunchEnabled: 'Обед',
        lunchStart: 'Начало обеда',
        lunchEnd: 'Конец обеда',
        workdayEnd: 'Конец рабочего дня',
        howItWorksTitle: 'Как работает:',
        howItWorksText: 'Таймер привязывается к началу часа. Если включено в 09:15 — цепочка начнётся с 09:00, а таймер покажет оставшееся время текущей сессии. Обед пропускается в расчётах.',
        sound: 'Звук',
        browserNotif: 'Браузерные уведомления',
        testSound: '🔔 Проверить звук',
        save: 'Сохранить',
        start: 'Старт',
        pause: 'Пауза',
        reset: 'Сброс',
        skip: 'Пропуск',
        session: 'Сессия',
        focus: 'Фокус',
        shortBreakLabel: 'Короткий перерыв',
        longBreakLabel: 'Длинный перерыв',
        breakTime: 'Время перерыва!',
        workTime: 'Время работать!',
        pageTitle: ' - Помодоро',
        starOnGithub: 'Star on GitHub',
        lunch: 'Обед',
        beforeWork: 'До начала рабочего дня',
        afterWork: 'Рабочий день окончен',
        invalidTime: 'Неверный формат времени'
      },
      en: {
        settings: 'Settings',
        language: 'Language',
        durations: 'Duration (min)',
        sync: 'Synchronization',
        notifications: 'Notifications',
        work: 'Work',
        shortBreak: 'Short break',
        longBreak: 'Long break',
        sessionsBeforeLongBreak: 'Sessions before long break',
        workdaySync: 'Sync with workday',
        workdayStart: 'Workday start',
        lunchEnabled: 'Lunch',
        lunchStart: 'Lunch start',
        lunchEnd: 'Lunch end',
        workdayEnd: 'Workday end',
        howItWorksTitle: 'How it works:',
        howItWorksText: 'Timer is anchored to the hour start. If enabled at 09:15 — the chain starts from 09:00, and the timer shows remaining time of the current session. Lunch is skipped in calculations.',
        sound: 'Sound',
        browserNotif: 'Browser notifications',
        testSound: '🔔 Test sound',
        save: 'Save',
        start: 'Start',
        pause: 'Pause',
        reset: 'Reset',
        skip: 'Skip',
        session: 'Session',
        focus: 'Focus',
        shortBreakLabel: 'Short break',
        longBreakLabel: 'Long break',
        breakTime: 'Time for a break!',
        workTime: 'Time to work!',
        pageTitle: ' - Pomodoro',
        starOnGithub: 'Star on GitHub',
        lunch: 'Lunch',
        beforeWork: 'Before workday',
        afterWork: 'Workday ended',
        invalidTime: 'Invalid time format'
      }
    };

    function detectBrowserLanguage() {
      const lang = (navigator.language || navigator.userLanguage || 'ru').toLowerCase();
      return lang.startsWith('en') ? 'en' : 'ru';
    }

    let settings = {
      workDuration: 25,
      shortBreakDuration: 5,
      longBreakDuration: 15,
      sessionsBeforeLongBreak: 4,
      workdaySync: false,
      workdayStart: '09:00',
      lunchEnabled: true,
      lunchStart: '13:00',
      lunchEnd: '14:00',
      workdayEnd: '18:00',
      workDays: [1, 2, 3, 4, 5],
      soundEnabled: true,
      browserNotification: true,
      language: detectBrowserLanguage(),
      theme: 'mocha'
    };

    let state = {
      mode: 'work',
      timeLeft: settings.workDuration * 60,
      totalTime: settings.workDuration * 60,
      running: false,
      currentSession: 1,
      intervalId: null,
      syncedStartTime: null
    };

    const $ = id => document.getElementById(id);

    function applyLanguage() {
      const t = translations[settings.language] || translations.ru;
      const htmlLang = settings.language === 'en' ? 'en' : 'ru';
      document.documentElement.lang = htmlLang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) {
          el.textContent = t[key];
        }
      });

      $('settingsTitle').textContent = t.settings;
      $('langSectionTitle').textContent = t.language;
      $('durationSectionTitle').textContent = t.durations;
      $('syncSectionTitle').textContent = t.sync;
      $('notifSectionTitle').textContent = t.notifications;

      const dayLabels = settings.language === 'en'
        ? ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa']
        : ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
      document.querySelectorAll('#workdayDays input[type="checkbox"]').forEach(cb => {
        const span = cb.parentElement.querySelector('span');
        if (span) span.textContent = dayLabels[parseInt(cb.value)];
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === settings.language);
      });

      updateModeTabs();
      updateStartButton();
      document.title = `${formatTime(state.timeLeft)}${t.pageTitle}`;
    }

    function updateStartButton() {
      const t = translations[settings.language] || translations.ru;
      $('startBtn').textContent = state.running ? t.pause : t.start;
    }

    function formatTime(seconds) {
      const m = Math.floor(Math.abs(seconds) / 60);
      const s = Math.abs(seconds) % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function updateDisplay() {
      $('timerTime').textContent = formatTime(state.timeLeft);
      const progress = 1 - (state.timeLeft / state.totalTime);
      $('progressCircle').style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
      const t = translations[settings.language] || translations.ru;
      document.title = `${formatTime(state.timeLeft)}${t.pageTitle}`;

      if (settings.workdaySync) {
        const synced = calculateSyncedTime();
        if (synced) {
          if (synced.type === 'lunch') {
            $('timerLabel').textContent = t.lunch;
            return;
          }
          if (synced.type === 'before-work') {
            $('timerLabel').textContent = t.beforeWork;
            return;
          }
          if (synced.type === 'after-work') {
            $('timerLabel').textContent = t.afterWork;
            return;
          }
        }
      }
    }

    function updateModeTabs() {
      document.querySelectorAll('.mode-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.dataset.mode === state.mode) tab.classList.add('active');
      });

      const circle = $('progressCircle');
      circle.classList.remove('short-break', 'long-break');
      if (state.mode === 'shortBreak') circle.classList.add('short-break');
      if (state.mode === 'longBreak') circle.classList.add('long-break');

      const t = translations[settings.language] || translations.ru;
      const labels = { work: t.focus, shortBreak: t.shortBreakLabel, longBreak: t.longBreakLabel, lunch: t.lunch };
      $('timerLabel').textContent = labels[state.mode];
    }

    function updateSessionDots() {
      const container = $('sessionDots');
      container.innerHTML = '';
      for (let i = 1; i <= settings.sessionsBeforeLongBreak; i++) {
        const dot = document.createElement('div');
        dot.className = 'session-dot' + (i < state.currentSession ? ' completed' : '');
        container.appendChild(dot);
      }
      $('currentSession').textContent = state.currentSession;
      $('totalSessions').textContent = settings.sessionsBeforeLongBreak;
    }

    function getDuration(mode) {
      switch (mode) {
        case 'work': return settings.workDuration * 60;
        case 'shortBreak': return settings.shortBreakDuration * 60;
        case 'longBreak': return settings.longBreakDuration * 60;
      }
    }

    function switchMode(mode, resetTimer = true) {
      state.mode = mode;
      if (resetTimer) {
        state.timeLeft = getDuration(mode);
        state.totalTime = getDuration(mode);
      }
      updateModeTabs();
      updateDisplay();
      updateSessionDots();
    }

    function getNextMode() {
      if (state.mode === 'work') {
        return state.currentSession >= settings.sessionsBeforeLongBreak ? 'longBreak' : 'shortBreak';
      }
      if (state.mode === 'shortBreak') {
        state.currentSession++;
        return 'work';
      }
      state.currentSession = 1;
      return 'work';
    }

    let audioCtx = null;

    function getAudioContext() {
      if (!audioCtx || audioCtx.state === 'closed') {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function playTone(ctx, freq, startTime, duration, type = 'sine', volume = 0.3) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    function playWorkEndSound() {
      if (!settings.soundEnabled) return;
      try {
        const ctx = getAudioContext();
        const now = ctx.currentTime;
        playTone(ctx, 523.25, now, 0.3, 'sine', 0.3);
        playTone(ctx, 659.25, now + 0.15, 0.3, 'sine', 0.3);
        playTone(ctx, 783.99, now + 0.3, 0.4, 'sine', 0.3);
        playTone(ctx, 1046.50, now + 0.5, 0.5, 'sine', 0.25);
      } catch (e) {}
    }

    function playBreakEndSound() {
      if (!settings.soundEnabled) return;
      try {
        const ctx = getAudioContext();
        const now = ctx.currentTime;
        playTone(ctx, 783.99, now, 0.2, 'triangle', 0.25);
        playTone(ctx, 659.25, now + 0.2, 0.2, 'triangle', 0.25);
        playTone(ctx, 523.25, now + 0.4, 0.4, 'triangle', 0.3);
      } catch (e) {}
    }

    function playTestSound() {
      try {
        const ctx = getAudioContext();
        const now = ctx.currentTime;
        playTone(ctx, 440, now, 0.15, 'sine', 0.2);
        playTone(ctx, 554.37, now + 0.15, 0.15, 'sine', 0.2);
        playTone(ctx, 659.25, now + 0.3, 0.25, 'sine', 0.2);
      } catch (e) {}
    }

    function triggerNotification(isWorkEnding) {
      if (settings.soundEnabled) {
        isWorkEnding ? playWorkEndSound() : playBreakEndSound();
      }

      if (settings.browserNotification && 'Notification' in window && Notification.permission === 'granted') {
        const t = translations[settings.language] || translations.ru;
        const body = isWorkEnding ? t.breakTime : t.workTime;
        new Notification('Pomodoro', { body });
      }
    }

    function tick() {
      if (state.timeLeft <= 0) {
        clearInterval(state.intervalId);
        triggerNotification(state.mode === 'work');

        if (settings.workdaySync) {
          const synced = calculateSyncedTime();
          if (synced && (synced.type === 'work' || synced.type === 'break')) {
            state.timeLeft = synced.timeLeft;
            state.totalTime = synced.totalTime;
            state.mode = synced.mode;
            state.currentSession = synced.session || state.currentSession;
            updateModeTabs();
            updateDisplay();
            updateSessionDots();
            state.running = true;
            updateStartButton();
            state.intervalId = setInterval(tick, 1000);
            return;
          }
          if (synced && synced.type === 'lunch') {
            state.timeLeft = synced.timeLeft;
            state.totalTime = synced.timeLeft;
            state.mode = 'lunch';
            updateModeTabs();
            updateDisplay();
            state.running = true;
            updateStartButton();
            state.intervalId = setInterval(tick, 1000);
            return;
          }
        }

        const nextMode = getNextMode();
        switchMode(nextMode);
        updateStartButton();
        $('startBtn').classList.remove('paused');

        state.running = true;
        updateStartButton();
        state.intervalId = setInterval(tick, 1000);
        return;
      }

      if (settings.workdaySync) {
        const synced = calculateSyncedTime();
        if (synced && (synced.type === 'work' || synced.type === 'break')) {
          state.timeLeft = synced.timeLeft;
          state.totalTime = synced.totalTime;
          if (synced.mode !== state.mode) {
            triggerNotification(state.mode === 'work');
            state.mode = synced.mode;
            state.currentSession = synced.session || state.currentSession;
            updateModeTabs();
            updateSessionDots();
          }
          updateDisplay();
          return;
        }
        if (synced && synced.type === 'lunch') {
          if (state.mode !== 'lunch') {
            triggerNotification(true);
            state.mode = 'lunch';
            updateModeTabs();
          }
          state.timeLeft = synced.timeLeft;
          state.totalTime = synced.timeLeft;
          updateDisplay();
          return;
        }
      }

      state.timeLeft--;
      updateDisplay();
    }

    function calculateSyncedTime() {
      const now = new Date();
      const workDays = settings.workDays || [1, 2, 3, 4, 5];
      if (!workDays.includes(now.getDay())) {
        return null;
      }

      const [startH, startM] = settings.workdayStart.split(':').map(Number);
      const [endH, endM] = settings.workdayEnd.split(':').map(Number);

      const workdayStartSec = (startH * 60 + startM) * 60;
      const workdayEndSec = (endH * 60 + endM) * 60;

      const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

      if (currentSec < workdayStartSec) {
        return { type: 'before-work', timeLeft: Math.ceil((workdayStartSec - currentSec)) };
      }

      if (currentSec >= workdayEndSec) {
        return { type: 'after-work' };
      }

      let elapsed;

      if (settings.lunchEnabled) {
        const [lunchSH, lunchSM] = settings.lunchStart.split(':').map(Number);
        const [lunchEH, lunchEM] = settings.lunchEnd.split(':').map(Number);
        const lunchStartSec = (lunchSH * 60 + lunchSM) * 60;
        const lunchEndSec = (lunchEH * 60 + lunchEM) * 60;

        if (currentSec < lunchStartSec) {
          elapsed = currentSec - workdayStartSec;
        } else if (currentSec >= lunchStartSec && currentSec < lunchEndSec) {
          return {
            type: 'lunch',
            timeLeft: Math.ceil(lunchEndSec - currentSec),
            totalTime: lunchEndSec - lunchStartSec
          };
        } else {
          elapsed = currentSec - lunchEndSec;
        }
      } else {
        elapsed = currentSec - workdayStartSec;
      }

      const workSec = settings.workDuration * 60;
      const shortBreakSec = settings.shortBreakDuration * 60;
      const longBreakSec = settings.longBreakDuration * 60;

      let accumulated = 0;
      let session = 1;

      while (true) {
        const workEnd = accumulated + workSec;
        if (elapsed < workEnd) {
          return {
            type: 'work',
            timeLeft: Math.ceil(workEnd - elapsed),
            totalTime: workSec,
            mode: 'work',
            session
          };
        }
        accumulated = workEnd;

        const isLongBreak = session >= settings.sessionsBeforeLongBreak;
        const breakSec = isLongBreak ? longBreakSec : shortBreakSec;
        const breakEnd = accumulated + breakSec;

        if (elapsed < breakEnd) {
          return {
            type: 'break',
            timeLeft: Math.ceil(breakEnd - elapsed),
            totalTime: breakSec,
            mode: isLongBreak ? 'longBreak' : 'shortBreak',
            session
          };
        }
        accumulated = breakEnd;

        if (isLongBreak) session = 1;
        else session++;
      }
    }

    function validateLunchTimes(settingsObj) {
      const [wsH, wsM] = settingsObj.workdayStart.split(':').map(Number);
      const [weH, weM] = settingsObj.workdayEnd.split(':').map(Number);
      const [lsH, lsM] = settingsObj.lunchStart.split(':').map(Number);
      const [leH, leM] = settingsObj.lunchEnd.split(':').map(Number);

      const wsMin = wsH * 60 + wsM;
      const weMin = weH * 60 + weM;
      const lsMin = lsH * 60 + lsM;
      const leMin = leH * 60 + leM;

      if (leMin <= lsMin) {
        return { valid: false, reason: 'Конец обеда должен быть после начала обеда' };
      }

      if (leMin <= wsMin) {
        return { valid: false, reason: 'Обед заканчивается до начала рабочего дня' };
      }

      if (lsMin >= weMin) {
        return { valid: false, reason: 'Обед начинается после конца рабочего дня' };
      }

      if (lsMin <= wsMin && leMin >= weMin) {
        return { valid: false, reason: 'Обед полностью покрывает рабочий день' };
      }

      if (lsMin < wsMin && leMin > wsMin && leMin < weMin) {
        return { 
          valid: false, 
          reason: 'Обед пересекает начало рабочего дня',
          adjustedWorkdayStart: settingsObj.lunchEnd
        };
      }

      if (lsMin >= wsMin && lsMin < weMin && leMin > weMin) {
        return { 
          valid: false, 
          reason: 'Обед пересекает конец рабочего дня',
          adjustedWorkdayEnd: settingsObj.lunchStart
        };
      }

      if (lsMin == wsMin && leMin < weMin) {
        return { 
          valid: false, 
          reason: 'Обед начинается в момент начала рабочего дня',
          adjustedWorkdayStart: settingsObj.lunchEnd
        };
      }

      if (leMin == weMin && lsMin > wsMin) {
        return { 
          valid: false, 
          reason: 'Обед заканчивается в момент конца рабочего дня',
          adjustedWorkdayEnd: settingsObj.lunchStart
        };
      }

      return { valid: true };
    }

    function toggleLunchFields() {
      const lunchEnabled = $('lunchEnabled').checked;
      const lunchStartRow = $('lunchStartRow');
      const lunchEndRow = $('lunchEndRow');

      if (lunchEnabled) {
        lunchStartRow.classList.remove('disabled');
        lunchEndRow.classList.remove('disabled');
        $('lunchStart').disabled = false;
        $('lunchEnd').disabled = false;
      } else {
        lunchStartRow.classList.add('disabled');
        lunchEndRow.classList.add('disabled');
        $('lunchStart').disabled = true;
        $('lunchEnd').disabled = true;
      }
    }

    function applyTimeMask(input) {
      const pos = input.selectionStart;
      const beforeLen = input.value.length;
      let raw = input.value.replace(/[^\d]/g, '');
      if (raw.length > 4) raw = raw.slice(0, 4);
      let formatted;
      if (raw.length <= 2) {
        formatted = raw;
      } else {
        formatted = raw.slice(0, 2) + ':' + raw.slice(2);
      }
      input.value = formatted;
      const diff = formatted.length - beforeLen;
      if (diff === 1 && formatted[pos - 1] === ':') {
        input.setSelectionRange(pos + 1, pos + 1);
      }
    }

    function validateTimeInput(input) {
      const val = input.value;
      const match = val.match(/^(\d{1,2}):(\d{2})$/);
      if (!match) {
        input.classList.add('invalid');
        return null;
      }
      const h = parseInt(match[1], 10);
      const m = parseInt(match[2], 10);
      if (h > 23 || m > 59) {
        input.classList.add('invalid');
        return null;
      }
      input.classList.remove('invalid');
      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function normalizeTimeOnBlur(input) {
      const raw = input.value.replace(/[^\d]/g, '');
      let h, m;
      if (raw.length === 1 || raw.length === 2) {
        h = parseInt(raw, 10);
        m = 0;
      } else if (raw.length === 3) {
        h = parseInt(raw.slice(0, 1), 10);
        m = parseInt(raw.slice(1, 3), 10);
      } else if (raw.length === 4) {
        h = parseInt(raw.slice(0, 2), 10);
        m = parseInt(raw.slice(2, 4), 10);
      } else {
        return validateTimeInput(input);
      }
      if (isNaN(h) || isNaN(m) || h > 23 || m > 59) {
        input.classList.add('invalid');
        return null;
      }
      const result = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      input.value = result;
      input.classList.remove('invalid');
      return result;
    }

    function initTimeInputs() {
      document.querySelectorAll('.time-text-input').forEach(input => {
        input.addEventListener('input', () => applyTimeMask(input));
        input.addEventListener('blur', () => normalizeTimeOnBlur(input));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            normalizeTimeOnBlur(input);
            input.blur();
          }
        });
        input.addEventListener('focus', () => {
          input.classList.remove('invalid');
        });
      });
    }

    function startTimer() {
      if (state.running) {
        clearInterval(state.intervalId);
        state.running = false;
        updateStartButton();
        $('startBtn').classList.add('paused');
        return;
      }

      if (settings.workdaySync) {
        const synced = calculateSyncedTime();
        if (synced) {
          if (synced.type === 'before-work') {
            state.timeLeft = synced.timeLeft;
            state.totalTime = synced.timeLeft;
            state.mode = 'work';
            updateModeTabs();
            updateDisplay();
            state.running = true;
            updateStartButton();
            state.intervalId = setInterval(tick, 1000);
            return;
          }
          if (synced.type === 'after-work') {
            return;
          }
          if (synced.type === 'lunch') {
            state.timeLeft = synced.timeLeft;
            state.totalTime = synced.timeLeft;
            state.mode = 'lunch';
            updateModeTabs();
            updateDisplay();
            state.running = true;
            updateStartButton();
            state.intervalId = setInterval(tick, 1000);
            return;
          }
          if (synced.type === 'work' || synced.type === 'break') {
            state.timeLeft = synced.timeLeft;
            state.totalTime = synced.totalTime;
            state.mode = synced.mode;
            state.currentSession = synced.session || state.currentSession;
            updateModeTabs();
            updateDisplay();
            updateSessionDots();
          }
        }
      }

      state.running = true;
      updateStartButton();
      $('startBtn').classList.remove('paused');
      state.intervalId = setInterval(tick, 1000);
    }

    function resetTimer() {
      clearInterval(state.intervalId);
      state.running = false;
      state.currentSession = 1;
      switchMode('work');
      updateStartButton();
      $('startBtn').classList.remove('paused');
    }

    function skipSession() {
      clearInterval(state.intervalId);
      state.running = false;
      const nextMode = getNextMode();
      switchMode(nextMode);
      updateStartButton();
      $('startBtn').classList.remove('paused');
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        if (data.language) {
          settings = { ...settings, ...data };
        } else {
          const detectedLang = detectBrowserLanguage();
          settings = { ...settings, ...data, language: detectedLang };
        }
        applySettings();
      } catch (e) {
        console.warn('Failed to load settings:', e);
      }
      return settings;
    }

    function applySettings() {
      $('workDuration').value = settings.workDuration;
      $('shortBreakDuration').value = settings.shortBreakDuration;
      $('longBreakDuration').value = settings.longBreakDuration;
      $('sessionsBeforeLongBreak').value = settings.sessionsBeforeLongBreak;
      $('workdayStart').value = settings.workdayStart;
      $('lunchEnabled').checked = settings.lunchEnabled;
      $('lunchStart').value = settings.lunchStart;
      $('lunchEnd').value = settings.lunchEnd;
      $('workdayEnd').value = settings.workdayEnd;
      $('soundEnabled').checked = settings.soundEnabled;
      $('browserNotification').checked = settings.browserNotification;

      const workDays = (settings.workDays || [1, 2, 3, 4, 5]).map(Number);
      document.querySelectorAll('#workdayDays input[type="checkbox"]').forEach(cb => {
        cb.checked = workDays.includes(parseInt(cb.value));
      });

      toggleLunchFields();
      updateSyncToggle();
      applyLanguage();
      applyTheme();

      if (!state.running) {
        switchMode(state.mode);
      }
    }

    async function saveSettings() {
      const workDays = [];
      document.querySelectorAll('#workdayDays input[type="checkbox"]').forEach(cb => {
        if (cb.checked) workDays.push(parseInt(cb.value));
      });

      const timeFields = ['workdayStart', 'lunchStart', 'lunchEnd', 'workdayEnd'];
      const timeValues = {};
      for (const id of timeFields) {
        const input = $(id);
        const val = normalizeTimeOnBlur(input);
        if (!val) {
          const t = translations[settings.language] || translations.ru;
          alert(`${t[id] || id}: ${t.invalidTime || 'Invalid time format'}`);
          input.focus();
          return;
        }
        timeValues[id] = val;
      }

      const newSettings = {
        workDuration: parseInt($('workDuration').value) || 25,
        shortBreakDuration: parseInt($('shortBreakDuration').value) || 5,
        longBreakDuration: parseInt($('longBreakDuration').value) || 15,
        sessionsBeforeLongBreak: parseInt($('sessionsBeforeLongBreak').value) || 4,
        workdaySync: settings.workdaySync,
        workdayStart: timeValues.workdayStart,
        lunchEnabled: $('lunchEnabled').checked,
        lunchStart: timeValues.lunchStart,
        lunchEnd: timeValues.lunchEnd,
        workdayEnd: timeValues.workdayEnd,
        workDays,
        soundEnabled: $('soundEnabled').checked,
        browserNotification: $('browserNotification').checked,
        language: settings.language,
        theme: settings.theme
      };

      if (newSettings.lunchEnabled) {
        const validation = validateLunchTimes(newSettings);
        if (!validation.valid) {
          let message = validation.reason;
          
          if (validation.adjustedWorkdayStart) {
            message += `. Начало рабочего дня скорректировано до ${validation.adjustedWorkdayStart}`;
            newSettings.workdayStart = validation.adjustedWorkdayStart;
            $('workdayStart').value = newSettings.workdayStart;
          }
          
          if (validation.adjustedWorkdayEnd) {
            message += `. Конец рабочего дня скорректирован до ${validation.adjustedWorkdayEnd}`;
            newSettings.workdayEnd = validation.adjustedWorkdayEnd;
            $('workdayEnd').value = newSettings.workdayEnd;
          }
          
          message += '. Обед будет отключен.';
          alert(message);
          
          newSettings.lunchEnabled = false;
          $('lunchEnabled').checked = false;
          toggleLunchFields();
        }
      }

      try {
        await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newSettings)
        });
        settings = newSettings;

        if (!state.running) {
          state.timeLeft = getDuration(state.mode);
          state.totalTime = getDuration(state.mode);
          updateDisplay();
        }
        updateSessionDots();

        $('settingsPanel').classList.remove('open');
        $('settingsOverlay').classList.remove('open');
      } catch (e) {
        console.error('Failed to save settings:', e);
      }
    }

    function openSettings() {
      $('settingsPanel').classList.add('open');
      $('settingsOverlay').classList.add('open');
    }

    function closeSettings() {
      $('settingsPanel').classList.remove('open');
      $('settingsOverlay').classList.remove('open');
    }

    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        if (state.running) return;
        switchMode(tab.dataset.mode);
      });
    });

    $('startBtn').addEventListener('click', startTimer);
    $('resetBtn').addEventListener('click', resetTimer);
    $('skipBtn').addEventListener('click', skipSession);
    $('settingsToggle').addEventListener('click', openSettings);
    $('settingsClose').addEventListener('click', closeSettings);
    $('settingsOverlay').addEventListener('click', closeSettings);
    $('saveSettings').addEventListener('click', saveSettings);
    $('testSoundBtn').addEventListener('click', playTestSound);

    $('lunchEnabled').addEventListener('change', toggleLunchFields);

    function updateSyncToggle() {
      $('syncToggle').classList.toggle('active', settings.workdaySync);
    }

    function applyTheme() {
      const isLatte = settings.theme === 'latte';
      document.documentElement.setAttribute('data-theme', isLatte ? 'latte' : '');
      $('themeToggle').querySelector('.icon-sun').style.display = isLatte ? 'none' : '';
      $('themeToggle').querySelector('.icon-moon').style.display = isLatte ? '' : 'none';
    }

    function toggleTheme() {
      settings.theme = settings.theme === 'latte' ? 'mocha' : 'latte';
      applyTheme();
      fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(settings)
      }).catch(() => {});
    }

    $('themeToggle').addEventListener('click', toggleTheme);

    function toggleSync() {
      settings.workdaySync = !settings.workdaySync;
      updateSyncToggle();
      fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(settings)
      }).catch(() => {});
    }

    $('syncToggle').addEventListener('click', toggleSync);
    $('browserNotification').addEventListener('change', (e) => {
      if (e.target.checked && 'Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        settings.language = btn.dataset.lang;
        applyLanguage();
        fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(settings)
        }).catch(() => {});
      });
    });

    loadSettings().then(() => {
      if (settings.browserNotification && 'Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    });
    initTimeInputs();
    applyTheme();
    updateDisplay();
    updateSessionDots();
  </script>
</body>
</html>
